name: Sync public product data

on:
  workflow_dispatch:
    inputs:
      allow_empty:
        description: Allow an empty roadmap snapshot to replace published data during recovery
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [product-data-sync]
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: public-product-data-sync
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HOMUN_GITHUB_TOKEN: ${{ secrets.ROADMAP_GITHUB_TOKEN }}
      HOMUN_PROJECT_OWNER: homun-app
      HOMUN_PROJECT_NUMBER: ${{ secrets.HOMUN_PROJECT_NUMBER }}
      HOMUN_RELEASES_REPO: homun-app/homun-releases
    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Synchronize roadmap and releases
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.allow_empty == false }}
        run: npm run sync:product-data -- --write

      - name: Synchronize roadmap and releases (allow empty recovery)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_empty == true }}
        run: npm run sync:product-data -- --write --allow-empty

      - name: Validate generated snapshots
        run: npm run test:product-data

      - name: Commit semantic changes
        shell: bash
        run: |
          if git diff --quiet -- src/data/roadmap.json src/data/releases.json; then
            echo "Public product data is already current."
            exit 0
          fi
          git config user.name "homun-product-sync"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/roadmap.json src/data/releases.json
          git commit -m "chore: sync public product data"
          git push
