<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon_white.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homun — Personal AI Assistant</title>
    <meta name="description" content="A single-binary personal AI assistant built in Rust. Local-first, privacy-focused, skill-powered. Runs 24/7 on your machine." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-background text-text font-sans antialiased overflow-x-hidden selection:bg-accent/30 selection:text-accent">
    <!-- Overlay Noise SVG for Texture -->
    <svg class="fixed inset-0 pointer-events-none z-[9999] opacity-[0.05] w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
